name: License Server Tests

on:
  push:
    branches: [main, develop]
    paths:
      - "wavy-license-server/**"
      - ".github/workflows/license-server-tests.yml"
  pull_request:
    paths:
      - "wavy-license-server/**"

jobs:
  test:
    name: pytest (${{ matrix.os }} / Python ${{ matrix.python }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, windows-latest, macos-14]
        python: ["3.11", "3.12"]

    defaults:
      run:
        working-directory: wavy-license-server

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip
          cache-dependency-path: wavy-license-server/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run tests
        env:
          DATABASE_URL: "sqlite:///:memory:"
          LICENSE_HMAC_SECRET: "ci-test-secret"
          STRIPE_SECRET_KEY: "sk_test_fake"
          STRIPE_WEBHOOK_SECRET: "whsec_fake"
          STRIPE_PRO_PRICE_ID: "price_pro_test"
          STRIPE_STUDIO_PRICE_ID: "price_studio_test"
          RESEND_API_KEY: ""
        run: pytest tests/ -v --tb=short --cov=. --cov-report=term-missing --cov-report=xml

      - name: Upload coverage
        if: matrix.os == 'ubuntu-22.04' && matrix.python == '3.11'
        uses: actions/upload-artifact@v4
        with:
          name: license-server-coverage
          path: wavy-license-server/coverage.xml
          if-no-files-found: ignore
