<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Wavy Labs app icon: stylised waveform inside rounded square -->
  <rect width="64" height="64" rx="14" fill="#0d0d14"/>
  <!-- Outer glow ring -->
  <rect width="64" height="64" rx="14" fill="none"
        stroke="url(#grad)" stroke-width="2" opacity="0.6"/>
  <!-- Waveform bars -->
  <rect x="8"  y="24" width="5" height="16" rx="2.5" fill="#7c5cbf"/>
  <rect x="15" y="18" width="5" height="28" rx="2.5" fill="#8a6dd0"/>
  <rect x="22" y="26" width="5" height="12" rx="2.5" fill="#7c5cbf"/>
  <rect x="29" y="12" width="6" height="40" rx="3"   fill="#4fc3f7"/>
  <rect x="37" y="20" width="5" height="24" rx="2.5" fill="#7c5cbf"/>
  <rect x="44" y="18" width="5" height="28" rx="2.5" fill="#8a6dd0"/>
  <rect x="51" y="24" width="5" height="16" rx="2.5" fill="#7c5cbf"/>
  <!-- Sparkle top-right -->
  <circle cx="53" cy="11" r="3" fill="#4fc3f7" opacity="0.9"/>
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#7c5cbf"/>
      <stop offset="100%" stop-color="#4fc3f7"/>
    </linearGradient>
  </defs>
</svg>
